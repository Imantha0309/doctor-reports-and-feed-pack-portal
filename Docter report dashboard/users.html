<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - EC Healthcare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon"><img src="assects/logo.jpeg" alt="EC Healthcare"></div>
            <span>EC Healthcare</span>
        </div>
        <div class="nav">
            <button class="nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
            <button class="nav-btn" onclick="location.href='feedbacks.html'">User feedbacks</button>
            <button class="nav-btn" onclick="location.href='reports.html'">Doctor reports</button>
        </div>
        <button class="user-menu" onclick="logout()">👤</button>
    </div>

    <div class="container">
        <div class="sidebar">
            <a href="dashboard.html" class="sidebar-item"><span>📊</span> Dashboard</a>
            <a href="users.html" class="sidebar-item active"><span>👥</span> Users</a>
            <a href="feedbacks.html" class="sidebar-item"><span>💬</span> Feedbacks</a>
            <a href="reports.html" class="sidebar-item"><span>📄</span> Reports</a>
        </div>

        <div class="main-content">
            <h2 style="margin-bottom: 1.5rem;">User Management</h2>

            <div class="toolbar">
                <input type="text" id="search-input" class="search-box" placeholder="🔍 Search users">
                <select id="role-filter" class="filter-select">
                    <option value="">All Roles</option>
                    <option value="admin">Admin</option>
                    <option value="doctor">Doctor</option>
                    <option value="user">User</option>
                </select>
                <select id="sort-select" class="filter-select">
                    <option value="newest">Newest first</option>
                    <option value="oldest">Oldest first</option>
                    <option value="name">Name A-Z</option>
                </select>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="users-table">
                        <tr><td colspan="6" style="text-align:center;padding:2rem;">Loading...</td></tr>
                    </tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>User Details</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/main.js"></script>
    <script>
        const PAGE_SIZE = 10;
        let allUsers = [], filtered = [], currentPage = 1;

        async function loadUsers() {
            try {
                const response = await fetch('php/api.php?action=users');
                const result = await response.json();
                if (result.success) {
                    allUsers = result.data;
                    applyFilters();
                }
            } catch (e) {
                console.error('Error loading users:', e);
            }
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const role   = document.getElementById('role-filter').value;
            const sort   = document.getElementById('sort-select').value;

            filtered = allUsers.filter(u => {
                const matchSearch = !search ||
                    u.username.toLowerCase().includes(search) ||
                    (u.full_name || '').toLowerCase().includes(search) ||
                    u.email.toLowerCase().includes(search);
                const matchRole = !role || u.role === role;
                return matchSearch && matchRole;
            });

            filtered.sort((a, b) => {
                if (sort === 'oldest') return new Date(a.created_at) - new Date(b.created_at);
                if (sort === 'name')   return (a.full_name || a.username).localeCompare(b.full_name || b.username);
                return new Date(b.created_at) - new Date(a.created_at);
            });

            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('users-table');
            const start = (currentPage - 1) * PAGE_SIZE;
            const page  = filtered.slice(start, start + PAGE_SIZE);

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;">No users found</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = page.map(u => `
                <tr onclick="openModal(${u.id})">
                    <td>#${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.full_name || 'N/A'}</td>
                    <td>${u.email}</td>
                    <td><span class="badge ${u.role}">${u.role}</span></td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');

            renderPagination(filtered.length);
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / PAGE_SIZE);
            const el = document.getElementById('pagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }

            let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
                    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
                } else if (Math.abs(i - currentPage) === 2) {
                    html += `<span class="page-info">…</span>`;
                }
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next ›</button>`;
            html += `<span class="page-info">${total} total</span>`;
            el.innerHTML = html;
        }

        function goPage(p) {
            const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
            if (p < 1 || p > totalPages) return;
            currentPage = p;
            renderTable();
        }

        function openModal(id) {
            const u = allUsers.find(x => x.id === id);
            if (!u) return;
            document.getElementById('modal-body').innerHTML = `
                <div class="detail-row">
                    <div class="detail-field"><label>Username</label><p>${u.username}</p></div>
                    <div class="detail-field"><label>Role</label><p><span class="badge ${u.role}">${u.role}</span></p></div>
                </div>
                <div class="detail-row">
                    <div class="detail-field"><label>Full Name</label><p>${u.full_name || 'N/A'}</p></div>
                    <div class="detail-field"><label>Email</label><p>${u.email}</p></div>
                </div>
                <div class="detail-row">
                    <div class="detail-field"><label>Joined</label><p>${new Date(u.created_at).toLocaleString()}</p></div>
                </div>
            `;
            document.getElementById('modal-overlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('role-filter').addEventListener('change', applyFilters);
        document.getElementById('sort-select').addEventListener('change', applyFilters);
        document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

        loadUsers();
    </script>
</body>
</html>
