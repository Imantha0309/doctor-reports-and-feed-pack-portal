<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC Healthcare - Patient Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════════ -->
<div id="auth-screen" class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="../Docter report dashboard/assects/logo.jpeg" alt="EC Healthcare">
            EC Healthcare
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            <button class="auth-tab" onclick="switchAuthTab('doctor')">Doctor Sign Up</button>
        </div>

        <!-- Login -->
        <div id="login-form" class="auth-form active">
            <div class="error-msg" id="login-error"></div>
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="login-username" placeholder="Enter username or email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            <button class="btn-primary" onclick="doLogin()">Login</button>
        </div>

        <!-- Register (Patient) -->
        <div id="register-form" class="auth-form">
            <div class="error-msg" id="register-error"></div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-fullname" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="At least 6 characters">
            </div>
            <button class="btn-primary" onclick="doRegister()">Create Account</button>
        </div>

        <!-- Register (Doctor) -->
        <div id="doctor-form" class="auth-form">
            <div class="error-msg" id="doctor-error"></div>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="doc-fullname" placeholder="Dr. Your Name">
            </div>
            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="doc-username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="doc-email" placeholder="doctor@hospital.com">
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="doc-password" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label>Specialization *</label>
                <input type="text" id="doc-specialization" placeholder="e.g. Cardiology, Pediatrics">
            </div>
            <div class="form-group">
                <label>License Number</label>
                <input type="text" id="doc-license" placeholder="Medical license number">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="doc-phone" placeholder="Contact number">
            </div>
            <button class="btn-primary" onclick="doRegisterDoctor()">Register as Doctor</button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════════
     PORTAL (shown after login)
══════════════════════════════════════════════ -->
<div id="portal-screen" style="display:none;">

    <header class="app-header">
        <div class="header-logo">
            <img src="../Docter report dashboard/assects/logo.jpeg" alt="">
            EC Healthcare
        </div>
        <div class="header-user">
            <span>Hello, <strong id="header-name"></strong></span>
            <button class="btn-logout" onclick="doLogout()">Logout</button>
        </div>
    </header>

    <nav class="app-nav">
        <button class="nav-tab active" onclick="showPage('reports-page', this)">&#128196; My Reports</button>
        <button class="nav-tab" onclick="showPage('feedback-page', this)">&#128172; Submit Feedback</button>
        <button class="nav-tab" onclick="showPage('history-page', this); loadFeedbackHistory()">&#128203; My Feedbacks</button>
    </nav>

    <div class="app-content">

        <!-- ── My Reports ── -->
        <div id="reports-page" class="page active">
            <div class="card">
                <div class="card-title">&#128196; My Medical Reports</div>
                <div id="reports-list">
                    <div class="empty-state"><div class="icon">&#128203;</div><p>Loading your reports...</p></div>
                </div>
            </div>
        </div>

        <!-- ── Submit Feedback ── -->
        <div id="feedback-page" class="page">
            <div class="card">
                <div class="card-title">&#128172; Submit Feedback</div>
                <div class="error-msg" id="feedback-error"></div>

                <!-- Doctor picker -->
                <div class="form-group">
                    <label>Select Doctor <span style="color:#95a5a6;font-weight:400;">(optional)</span></label>
                    <div id="doctor-picker" class="doctor-picker">
                        <div class="doctor-option selected" data-id="" onclick="selectDoctor(this)">
                            <div class="doctor-avatar general">&#127968;</div>
                            <div class="doctor-info">
                                <div class="doctor-name">General / No specific doctor</div>
                                <div class="doctor-spec">Feedback about overall service</div>
                            </div>
                            <span class="doctor-check">&#10003;</span>
                        </div>
                        <div id="doctor-options-list"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="fb-subject" placeholder="e.g. Appointment experience">
                </div>
                <div class="form-group">
                    <label>Your Rating *</label>
                    <div class="star-rating">
                        <input type="radio" id="s5" name="rating" value="5"><label for="s5">&#9733;</label>
                        <input type="radio" id="s4" name="rating" value="4"><label for="s4">&#9733;</label>
                        <input type="radio" id="s3" name="rating" value="3"><label for="s3">&#9733;</label>
                        <input type="radio" id="s2" name="rating" value="2"><label for="s2">&#9733;</label>
                        <input type="radio" id="s1" name="rating" value="1"><label for="s1">&#9733;</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Message *</label>
                    <textarea id="fb-message" placeholder="Share your experience, suggestions, or concerns..."></textarea>
                </div>
                <button class="btn-primary" onclick="submitFeedback()">Submit Feedback</button>
            </div>
        </div>

        <!-- ── Feedback History ── -->
        <div id="history-page" class="page">
            <div class="card">
                <div class="card-title">&#128203; My Submitted Feedbacks</div>
                <div id="feedback-history-list">
                    <div class="empty-state"><div class="icon">&#128172;</div><p>Loading...</p></div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Report detail modal -->
<div class="modal-overlay" id="report-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>Report Details</h3>
            <button class="modal-close" onclick="closeModal('report-modal')">&#215;</button>
        </div>
        <div class="modal-body" id="report-modal-body"></div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('report-modal')">Close</button>
        </div>
    </div>
</div>

<!-- Edit feedback modal -->
<div class="modal-overlay" id="edit-feedback-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>Edit Feedback</h3>
            <button class="modal-close" onclick="closeModal('edit-feedback-modal')">&#215;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Doctor <span style="color:#95a5a6;font-weight:400;">(optional)</span></label>
                <select id="edit-fb-doctor">
                    <option value="">-- No specific doctor --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="edit-fb-subject" placeholder="Subject">
            </div>
            <div class="form-group">
                <label>Rating *</label>
                <div class="star-rating">
                    <input type="radio" id="e5" name="edit-rating" value="5"><label for="e5">&#9733;</label>
                    <input type="radio" id="e4" name="edit-rating" value="4"><label for="e4">&#9733;</label>
                    <input type="radio" id="e3" name="edit-rating" value="3"><label for="e3">&#9733;</label>
                    <input type="radio" id="e2" name="edit-rating" value="2"><label for="e2">&#9733;</label>
                    <input type="radio" id="e1" name="edit-rating" value="1"><label for="e1">&#9733;</label>
                </div>
            </div>
            <div class="form-group">
                <label>Message *</label>
                <textarea id="edit-fb-message" placeholder="Your message..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('edit-feedback-modal')">Cancel</button>
            <button class="btn-primary" style="width:auto;padding:0.625rem 1.5rem;" onclick="saveEditFeedback()">Save Changes</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
