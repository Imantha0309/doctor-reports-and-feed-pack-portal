<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedbacks - EC Healthcare</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="feedback-styles.css">
</head>
<body>
    <!-- Sticky Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <h1 class="brand-name">EC Healthcare</h1>
                </div>
                
                <nav class="nav">
                    <ul class="nav-list">
                        <li><a href="index.html" class="nav-link">Home</a></li>
                        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                        <li><a href="feedback.html" class="nav-link active">User feedbacks</a></li>
                        <li><a href="doctors.html" class="nav-link">Doctor reports</a></li>
                    </ul>
                    <div class="user-icon">
                        <i class="fas fa-user"></i>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h2 class="page-title">User Feedbacks</h2>
                <p class="page-subtitle">Patient feedback and reviews</p>
            </div>

            <!-- Feedback Cards Container -->
            <div class="feedback-container" id="feedbackContainer">
                <!-- Feedbacks will be loaded dynamically from database -->
            </div>

            <!-- Pagination Container -->
            <div id="paginationContainer" class="pagination-container">
                <!-- Pagination will be rendered here -->
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" onclick="openFeedbackForm()">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Feedback Form Modal -->
    <div class="modal" id="feedbackModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Feedback</h3>
                <button class="close-btn" onclick="closeFeedbackForm()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="feedbackForm" class="modal-body">
                <div class="form-group">
                    <label for="patientName">Patient Name</label>
                    <input type="text" id="patientName" name="patientName" required>
                </div>
                
                <div class="form-group">
                    <label for="doctor">Doctor</label>
                    <select id="doctor" name="doctor">
                        <option value="">Select a doctor</option>
                        <!-- Doctors will be loaded dynamically -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <div class="rating-input">
                        <input type="radio" id="star5" name="rating" value="5">
                        <label for="star5"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1"><i class="fas fa-star"></i></label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="about">Feedback</label>
                    <textarea id="about" name="about" rows="4" required placeholder="Share your experience..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="sickness">Condition/Sickness</label>
                    <input type="text" id="sickness" name="sickness" placeholder="e.g., Heart Checkup, Headache, etc.">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeFeedbackForm()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Feedback</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container"></div>

    <script src="public/js/api-client.js"></script>
    <script src="feedback-script.js"></script>
</body>
</html>
