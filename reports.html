<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Reports - EC Healthcare</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="feedback-styles.css">
</head>
<body>
    <!-- Sticky Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <h1 class="brand-name">EC Healthcare</h1>
                </div>
                
                <nav class="nav">
                    <ul class="nav-list">
                        <li><a href="index.html" class="nav-link">Home</a></li>
                        <li><a href="feedback.html" class="nav-link">User feedbacks</a></li>
                        <li><a href="reports.html" class="nav-link active">Doctor reports</a></li>
                    </ul>
                    <div class="user-icon">
                        <i class="fas fa-user"></i>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h2 class="page-title">Doctor Reports</h2>
                <p class="page-subtitle">Medical reports and documentation</p>
            </div>

            <div class="coming-soon">
                <div class="coming-soon-content">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>Coming Soon</h3>
                    <p>Doctor reports functionality will be available soon.</p>
                    <a href="feedback.html" class="btn btn-primary">View User Feedbacks</a>
                </div>
            </div>
        </div>
    </main>

    <style>
        .coming-soon {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        
        .coming-soon-content {
            text-align: center;
            padding: 3rem;
            background-color: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--light-blue);
        }
        
        .coming-soon-content i {
            font-size: 4rem;
            color: var(--primary-blue);
            margin-bottom: 1rem;
        }
        
        .coming-soon-content h3 {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        
        .coming-soon-content p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.125rem;
        }
    </style>
</body>
</html>
